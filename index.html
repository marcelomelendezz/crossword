<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CRUCIGRAMA · LUKSO Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4efe5;
    --ink: #0e0e0e;
    --surface: #faf7f2;
    --border: #1a1a1a;
    --accent: #b8001a;
    --accent2: #0033cc;
    --muted: #7a7060;
    --cell-bg: #ffffff;
    --cell-word: #dde8ff;
    --cell-active: #ffe44d;
    --cell-correct: #d6f5e3;
    --correct-ink: #005c1f;
    --key-bg: #e5dfd2;
    --key-border: #bdb5a3;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--ink) 50%, var(--accent2) 100%);
    z-index: 100;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 560px;
    padding: 20px 20px 0;
  }

  .header-rule {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    margin-bottom: 5px;
  }

  .rule-line { height: 1px; background: var(--ink); }

  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 2rem;
    text-align: center;
    line-height: 1;
    margin: 3px 0;
  }

  .logo span { color: var(--accent); }

  .header-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0 12px;
    border-bottom: 2px solid var(--ink);
  }

  .meta-day {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    line-height: 1.6;
  }

  .meta-day strong {
    display: block;
    color: var(--ink);
    font-size: 0.78rem;
  }

  .meta-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .progress-bar {
    width: 72px; height: 4px;
    background: #ccc8bc;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent2);
    transition: width 0.3s ease;
    width: 0%;
  }

  /* ── MESSAGE ── */
  #message-bar {
    width: 100%;
    max-width: 560px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    padding: 4px 20px;
    min-height: 20px;
  }

  /* ── GAME AREA ── */
  .game-area {
    width: 100%;
    max-width: 560px;
    padding: 0 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── CROSSWORD GRID ── */
  #grid-container {
    display: flex;
    justify-content: center;
  }

  #crossword-grid {
    display: inline-grid;
    border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
  }

  .cell {
    width: 52px;
    height: 52px;
    border: 1px solid #b8b0a0;
    background: var(--cell-bg);
    position: relative;
    cursor: pointer;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .cell.black {
    background: var(--ink);
    cursor: default;
    border-color: var(--ink);
  }

  .cell.in-word  { background: var(--cell-word); }
  .cell.active   { background: var(--cell-active) !important; border-color: #aa8800; z-index: 2; }
  .cell.correct  { background: var(--cell-correct) !important; }

  .cell-number {
    position: absolute;
    top: 2px; left: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.5rem;
    color: var(--muted);
    line-height: 1;
    pointer-events: none;
    font-weight: 500;
  }

  .cell-letter {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--ink);
    pointer-events: none;
  }

  .cell.correct .cell-letter { color: var(--correct-ink); }
  .cell.wrong   .cell-letter { color: var(--accent); }

  /* ── ACTIVE CLUE BAR ── */
  #active-clue-bar {
    background: var(--ink);
    color: #f4efe5;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 46px;
    box-shadow: 2px 2px 0 #444;
  }

  .acb-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: #ffcc00;
    letter-spacing: 0.1em;
    flex-shrink: 0;
    line-height: 1.3;
    text-align: center;
  }

  .acb-sep { width: 1px; height: 28px; background: #444; flex-shrink: 0; }

  .acb-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.74rem;
    color: #e8e0d4;
    flex: 1;
    line-height: 1.35;
  }

  .acb-flip {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: #888;
    border: 1px solid #444;
    padding: 4px 7px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.12s;
    letter-spacing: 0.08em;
    -webkit-tap-highlight-color: transparent;
  }

  .acb-flip:active { background: #333; color: #fff; }

  /* ── CLUES ── */
  .clues-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    border-top: 1px solid #c8c0b0;
    padding-top: 8px;
  }

  .clue-group h3 {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid #d8d0c0;
    text-transform: uppercase;
  }

  .clue-item {
    display: flex;
    gap: 7px;
    padding: 4px 5px;
    cursor: pointer;
    transition: background 0.08s;
    margin-bottom: 1px;
    border-left: 2px solid transparent;
    -webkit-tap-highlight-color: transparent;
  }

  .clue-item:hover { background: rgba(0,51,204,0.06); }

  .clue-item.active {
    background: rgba(0,51,204,0.08);
    border-left-color: var(--accent2);
  }

  .clue-item.solved {
    opacity: 0.4;
    text-decoration: line-through;
    text-decoration-color: var(--correct-ink);
  }

  .clue-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    font-weight: 500;
    color: var(--accent2);
    min-width: 16px;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .clue-text {
    font-size: 0.68rem;
    color: var(--ink);
    line-height: 1.4;
  }

  /* ── KEYBOARD ── */
  #keyboard { padding: 4px 0 18px; }

  .kb-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 4px;
  }

  .key {
    height: 44px;
    min-width: 30px;
    padding: 0 3px;
    background: var(--key-bg);
    border: 1px solid var(--key-border);
    border-bottom: 3px solid #9e9480;
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.07s, border-bottom-width 0.07s;
  }

  .key:active { transform: translateY(2px); border-bottom-width: 1px; }
  .key.wide { min-width: 50px; font-size: 0.58rem; letter-spacing: 0.05em; }

  /* ── MODAL ── */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.82);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }

  #modal.show { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    padding: 34px 38px;
    max-width: 360px;
    width: 90%;
    text-align: center;
    animation: modal-in 0.32s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }

  .modal-deco {
    position: absolute;
    top: 6px; left: 6px; right: 6px; bottom: 6px;
    border: 1px solid #d8d0c0;
    pointer-events: none;
  }

  @keyframes modal-in {
    from { transform: scale(0.82) translateY(18px); opacity:0; }
    to   { transform: scale(1) translateY(0); opacity:1; }
  }

  .modal-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.28em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 2.2rem;
    color: var(--correct-ink);
    margin-bottom: 3px;
    line-height: 1;
  }

  .modal-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 22px;
  }

  .modal-stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .stat-box { border: 1px solid #c8c0b0; padding: 10px 4px; }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.48rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 4px;
  }

  .modal-next {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 18px;
    line-height: 1.8;
  }

  .modal-countdown {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--ink);
    display: block;
    margin-top: 2px;
  }

  .btn-close {
    background: var(--ink);
    border: none;
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    padding: 13px 28px;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s;
    text-transform: uppercase;
  }

  .btn-close:hover { opacity: 0.8; }

  @media (max-width: 420px) {
    .cell { width: 44px; height: 44px; }
    .cell-letter { font-size: 1.2rem; }
    .logo { font-size: 1.65rem; }
    .clues-row { grid-template-columns: 1fr; }
    .key { height: 40px; min-width: 27px; font-size: 0.65rem; }
    .key.wide { min-width: 44px; }
  }

  @media (max-width: 340px) {
    .cell { width: 36px; height: 36px; }
    .cell-letter { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-rule">
    <div class="rule-line"></div>
    <div class="header-eyebrow">LUKSO · DAILY GAMES</div>
    <div class="rule-line"></div>
  </div>
  <div class="logo">Cruci<span>·</span>grama</div>
  <div class="header-meta">
    <div class="meta-day">
      <span id="date-str">—</span>
      <strong id="puzzle-num">PUZZLE #—</strong>
    </div>
    <div class="meta-progress">
      <span id="pct-text">0%</span>
      <div class="progress-bar"><div class="progress-fill" id="pct-fill"></div></div>
    </div>
  </div>
</header>

<div id="message-bar">&nbsp;</div>

<div class="game-area">
  <div id="grid-container">
    <div id="crossword-grid"></div>
  </div>

  <div id="active-clue-bar">
    <div class="acb-badge" id="acb-badge">—</div>
    <div class="acb-sep"></div>
    <div class="acb-text" id="acb-text">Selecciona una celda para comenzar</div>
    <div class="acb-flip" onclick="flipDir()">↕ GIRAR</div>
  </div>

  <div class="clues-row">
    <div class="clue-group">
      <h3>→ Horizontal</h3>
      <div id="across-list"></div>
    </div>
    <div class="clue-group">
      <h3>↓ Vertical</h3>
      <div id="down-list"></div>
    </div>
  </div>

  <div id="keyboard"></div>
</div>

<!-- MODAL -->
<div id="modal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal-box">
    <div class="modal-deco"></div>
    <div class="modal-eyebrow">LUKSO · CRUCIGRAMA DIARIO</div>
    <div class="modal-title">¡Completo!</div>
    <div class="modal-sub" id="modal-sub">PUZZLE #1 · RESUELTO</div>
    <div class="modal-stats">
      <div class="stat-box">
        <div class="stat-num" id="st-played">0</div>
        <div class="stat-label">JUGADOS</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="st-wins">0</div>
        <div class="stat-label">COMPLETOS</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="st-streak">0</div>
        <div class="stat-label">RACHA</div>
      </div>
    </div>
    <div class="modal-next">
      PRÓXIMO PUZZLE EN<br>
      <span class="modal-countdown" id="modal-cd">--:--:--</span>
    </div>
    <button class="btn-close" onclick="document.getElementById('modal').classList.remove('show')">× Cerrar</button>
  </div>
</div>

<script>
// =====================================================
// PUZZLES (all verified: across + down words are real)
// Pattern: 5 rows, 5 cols
// rows 0,2,4 = full 5-letter words
// rows 1,3   = '[letter]###[letter]'  (col0 + col4 only)
// col0 and col4 form 5-letter down words
// =====================================================
const PUZZLES = [
  {
    grid: ['PANAL','A###U','SALON','E###A','OBRAR'],
    clues: {
      across: [
        {num:1, clue:'Estructura de cera que hacen las abejas'},
        {num:3, clue:'Habitación grande para recibir visitas'},
        {num:5, clue:'Trabajar, ejecutar una tarea o acción'},
      ],
      down: [
        {num:1, clue:'Caminata tranquila por la calle o parque'},
        {num:2, clue:'Satélite natural que ilumina la noche'},
      ]
    }
  },
  {
    grid: ['CANAL','A###U','BARON','R###E','ARMAS'],
    clues: {
      across: [
        {num:1, clue:'Vía de agua artificial para navegación'},
        {num:3, clue:'Título de nobleza por debajo del vizconde'},
        {num:5, clue:'Instrumentos de ataque y defensa en combate'},
      ],
      down: [
        {num:1, clue:'Animal hembra de la especie del cerdo salvaje'},
        {num:2, clue:'Días de la semana que no son fin de semana'},
      ]
    }
  },
  {
    grid: ['BARON','A###O','LASER','S###T','ADOBE'],
    clues: {
      across: [
        {num:1, clue:'Título de nobleza por encima del caballero'},
        {num:3, clue:'Rayo de luz coherente y amplificada'},
        {num:5, clue:'Ladrillo de barro secado al sol, sin hornear'},
      ],
      down: [
        {num:1, clue:'Mezcla de agua y arena para sellar o pegar'},
        {num:2, clue:'Punto cardinal opuesto al sur'},
      ]
    }
  },
  {
    grid: ['RAMOS','U###A','MOTEL','B###O','AVION'],
    clues: {
      across: [
        {num:1, clue:'Conjuntos de flores o ramas cortadas'},
        {num:3, clue:'Alojamiento de carretera para viajeros'},
        {num:5, clue:'Vehículo aéreo más pesado que el aire'},
      ],
      down: [
        {num:1, clue:'Ritmo musical de origen afrobrasileño'},
        {num:2, clue:'Espacio grande y sin divisiones interiores'},
      ]
    }
  },
  {
    grid: ['PALMO','L###P','ARENA','Z###C','ABONO'],
    clues: {
      across: [
        {num:1, clue:'Medida antigua equivalente al ancho de la mano'},
        {num:3, clue:'Partículas finas de roca en playas y desiertos'},
        {num:5, clue:'Sustancia que fertiliza la tierra de cultivo'},
      ],
      down: [
        {num:1, clue:'Lugar amplio, generalmente adoquinado, en una ciudad'},
        {num:2, clue:'Que no deja pasar la luz, no transparente'},
      ]
    }
  },
  {
    grid: ['CARAS','A###O','ROSAL','T###E','ALMAS'],
    clues: {
      across: [
        {num:1, clue:'Rostros o superficies frontales de algo'},
        {num:3, clue:'Planta espinosa que da rosas'},
        {num:5, clue:'Espíritus o esencias interiores de las personas'},
      ],
      down: [
        {num:1, clue:'Documento que acredita un derecho o título'},
        {num:2, clue:'Astros que brillan con luz propia en el firmamento'},
      ]
    }
  },
  {
    grid: ['FUGAS','O###U','NADIE','D###L','OVINO'],
    clues: {
      across: [
        {num:1, clue:'Escapadas o huidas de un lugar'},
        {num:3, clue:'Ninguna persona, pronombre indefinido negativo'},
        {num:5, clue:'Relativo a la oveja, ganado lanar'},
      ],
      down: [
        {num:1, clue:'Parte inferior de un recipiente; profundidad'},
        {num:2, clue:'Superficie plana de una habitación sobre la que se camina'},
      ]
    }
  },
];

// =====================================================
// DAILY SELECTION
// =====================================================
const DAY_INDEX = Math.floor((Date.now() - new Date('2025-01-01').getTime()) / 86400000) % PUZZLES.length;
const PUZZLE    = PUZZLES[DAY_INDEX];
const ROWS = 5, COLS = 5;

// =====================================================
// BUILD CELL DATA
// =====================================================
function buildCells() {
  const cells = [];
  let num = 1;
  const numbers = {}; // num -> {r,c}

  for (let r = 0; r < ROWS; r++) {
    cells[r] = [];
    for (let c = 0; c < COLS; c++) {
      const ch = PUZZLE.grid[r][c];
      const black = ch === '#';
      cells[r][c] = { r, c, black, letter: black ? '' : ch, userLetter: '', number: null };
    }
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (cells[r][c].black) continue;
      const sA = (c===0 || cells[r][c-1].black) && c+1<COLS && !cells[r][c+1].black;
      const sD = (r===0 || cells[r-1][c].black) && r+1<ROWS && !cells[r+1][c].black;
      if (sA || sD) {
        cells[r][c].number = num;
        numbers[num] = {r, c, sA, sD};
        num++;
      }
    }
  }
  return {cells, numbers};
}

let {cells, numbers} = buildCells();

// =====================================================
// STORAGE
// =====================================================
const SK = 'lukso_cross_v2';
const SK_STATS = 'lukso_cross_stats_v2';

function loadSaved() {
  try {
    const s = JSON.parse(localStorage.getItem(SK));
    if (s && s.day === DAY_INDEX) return s;
  } catch(e){}
  return null;
}

function saveCurrent() {
  const grid = cells.map(row => row.map(c => c.userLetter));
  localStorage.setItem(SK, JSON.stringify({day: DAY_INDEX, grid, done: gs.done}));
}

function getStats() {
  try { return JSON.parse(localStorage.getItem(SK_STATS)) || {p:0,w:0,s:0,ld:-1}; }
  catch(e) { return {p:0,w:0,s:0,ld:-1}; }
}

function saveStats(st) { localStorage.setItem(SK_STATS, JSON.stringify(st)); }

// =====================================================
// GAME STATE
// =====================================================
const gs = {
  ar: -1, ac: -1,   // active row/col
  dir: 'across',    // 'across' | 'down'
  wordCells: [],    // current word cells
  done: false,
};

// Restore
const saved = loadSaved();
if (saved) {
  gs.done = saved.done;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!cells[r][c].black && saved.grid[r] && saved.grid[r][c])
        cells[r][c].userLetter = saved.grid[r][c];
}

// =====================================================
// HELPERS
// =====================================================
function getWordCells(r, c, dir) {
  const wc = [];
  if (dir === 'across') {
    let sc = c;
    while (sc > 0 && !cells[r][sc-1].black) sc--;
    while (sc < COLS && !cells[r][sc].black) { wc.push({r, c:sc}); sc++; }
  } else {
    let sr = r;
    while (sr > 0 && !cells[sr-1][c].black) sr--;
    while (sr < ROWS && !cells[sr][c].black) { wc.push({r:sr, c}); sr++; }
  }
  return wc;
}

function canDir(r, c, dir) { return getWordCells(r, c, dir).length > 1; }

function wordNum(r, c, dir) {
  let sr = r, sc = c;
  if (dir === 'across') { while (sc > 0 && !cells[sr][sc-1].black) sc--; }
  else                  { while (sr > 0 && !cells[sr-1][sc].black) sr--; }
  return cells[sr][sc].number;
}

// =====================================================
// RENDER GRID
// =====================================================
function renderGrid() {
  const el = document.getElementById('crossword-grid');
  el.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
  el.style.gridTemplateRows    = `repeat(${ROWS}, 1fr)`;
  el.innerHTML = '';

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = cells[r][c];
      const div = document.createElement('div');
      div.className = 'cell' + (cell.black ? ' black' : '');
      div.dataset.r = r; div.dataset.c = c;

      if (!cell.black) {
        if (cell.number !== null) {
          const n = document.createElement('div');
          n.className = 'cell-number';
          n.textContent = cell.number;
          div.appendChild(n);
        }
        const l = document.createElement('div');
        l.className = 'cell-letter';
        l.id = `cl-${r}-${c}`;
        l.textContent = cell.userLetter || '';
        div.appendChild(l);

        div.addEventListener('click', () => onCell(r, c));
      }
      el.appendChild(div);
    }
  }
}

function cellEl(r, c) { return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`); }

function highlight() {
  document.querySelectorAll('.cell:not(.black)').forEach(el => el.classList.remove('active','in-word'));
  if (gs.ar < 0) return;

  gs.wordCells.forEach(({r,c}) => {
    const el = cellEl(r,c);
    if (el) el.classList.add('in-word');
  });
  const a = cellEl(gs.ar, gs.ac);
  if (a) a.classList.add('active');

  const wn = wordNum(gs.ar, gs.ac, gs.dir);
  updateClueBar(wn, gs.dir);
  highlightClue(wn, gs.dir);
}

// =====================================================
// CLUE BAR
// =====================================================
function updateClueBar(num, dir) {
  const list = PUZZLE.clues[dir];
  const entry = list.find(x => x.num === num);
  const badge = document.getElementById('acb-badge');
  const text  = document.getElementById('acb-text');
  badge.textContent = `${num}\n${dir === 'across' ? '→' : '↓'}`;
  text.textContent  = entry ? entry.clue : '—';
}

function highlightClue(num, dir) {
  document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`ci-${dir}-${num}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest', behavior:'smooth'}); }
}

// =====================================================
// RENDER CLUES
// =====================================================
function renderClues() {
  const aEl = document.getElementById('across-list');
  const dEl = document.getElementById('down-list');
  aEl.innerHTML = ''; dEl.innerHTML = '';

  PUZZLE.clues.across.forEach(({num, clue}) => {
    const d = document.createElement('div');
    d.className = 'clue-item';
    d.id = `ci-across-${num}`;
    d.innerHTML = `<span class="clue-num">${num}</span><span class="clue-text">${clue}</span>`;
    d.addEventListener('click', () => jumpTo(num, 'across'));
    aEl.appendChild(d);
  });

  PUZZLE.clues.down.forEach(({num, clue}) => {
    const d = document.createElement('div');
    d.className = 'clue-item';
    d.id = `ci-down-${num}`;
    d.innerHTML = `<span class="clue-num">${num}</span><span class="clue-text">${clue}</span>`;
    d.addEventListener('click', () => jumpTo(num, 'down'));
    dEl.appendChild(d);
  });
}

function jumpTo(num, dir) {
  const info = numbers[num];
  if (!info) return;
  gs.ar = info.r; gs.ac = info.c; gs.dir = dir;
  gs.wordCells = getWordCells(info.r, info.c, dir);
  highlight();
  document.getElementById('grid-container').scrollIntoView({behavior:'smooth', block:'nearest'});
}

// =====================================================
// CELL CLICK
// =====================================================
function onCell(r, c) {
  if (cells[r][c].black || gs.done) return;

  if (gs.ar === r && gs.ac === c) {
    // toggle direction
    const nd = gs.dir === 'across' ? 'down' : 'across';
    if (canDir(r, c, nd)) gs.dir = nd;
  } else {
    gs.ar = r; gs.ac = c;
    if (!canDir(r, c, gs.dir)) gs.dir = gs.dir === 'across' ? 'down' : 'across';
  }

  gs.wordCells = getWordCells(r, c, gs.dir);
  highlight();
}

// =====================================================
// FLIP DIRECTION
// =====================================================
function flipDir() {
  if (gs.ar < 0) return;
  const nd = gs.dir === 'across' ? 'down' : 'across';
  if (canDir(gs.ar, gs.ac, nd)) {
    gs.dir = nd;
    gs.wordCells = getWordCells(gs.ar, gs.ac, nd);
    highlight();
  }
}

// =====================================================
// INPUT
// =====================================================
function inputLetter(letter) {
  const {ar:r, ac:c} = gs;
  if (r < 0 || cells[r][c].black || gs.done) return;

  cells[r][c].userLetter = letter;
  updateCell(r, c);
  saveCurrent();
  refreshWordSolved(r, c);
  advance();
  updateProgress();
}

function inputBackspace() {
  const {ar:r, ac:c} = gs;
  if (r < 0 || cells[r][c].black || gs.done) return;

  if (cells[r][c].userLetter) {
    cells[r][c].userLetter = '';
    updateCell(r, c);
    saveCurrent();
    updateProgress();
  } else {
    retreat();
    const nr = gs.ar, nc = gs.ac;
    cells[nr][nc].userLetter = '';
    updateCell(nr, nc);
    saveCurrent();
    gs.wordCells = getWordCells(gs.ar, gs.ac, gs.dir);
    highlight();
    updateProgress();
  }
}

function updateCell(r, c) {
  const lEl = document.getElementById(`cl-${r}-${c}`);
  const cEl = cellEl(r, c);
  if (!lEl || !cEl) return;

  lEl.textContent = cells[r][c].userLetter || '';
  cEl.classList.remove('correct','wrong');
  if (cells[r][c].userLetter) {
    if (cells[r][c].userLetter === cells[r][c].letter) cEl.classList.add('correct');
    // Don't show wrong in real-time, only when word is complete
  }
}

function refreshWordSolved(r, c) {
  ['across','down'].forEach(dir => {
    const wc = getWordCells(r, c, dir);
    if (wc.length < 2) return;
    const allRight = wc.every(({r:wr, c:wc2}) => cells[wr][wc2].userLetter === cells[wr][wc2].letter);
    const wn = wordNum(r, c, dir);
    const clEl = document.getElementById(`ci-${dir}-${wn}`);
    if (clEl) {
      if (allRight) clEl.classList.add('solved');
      else clEl.classList.remove('solved');
    }
  });
}

function advance() {
  const wc = gs.wordCells;
  const idx = wc.findIndex(({r,c}) => r===gs.ar && c===gs.ac);
  if (idx >= 0 && idx < wc.length - 1) {
    gs.ar = wc[idx+1].r;
    gs.ac = wc[idx+1].c;
    highlight();
  } else {
    jumpNextIncomplete();
  }
}

function retreat() {
  const wc = gs.wordCells;
  const idx = wc.findIndex(({r,c}) => r===gs.ar && c===gs.ac);
  if (idx > 0) {
    gs.ar = wc[idx-1].r;
    gs.ac = wc[idx-1].c;
  }
}

function jumpNextIncomplete() {
  for (const dir of ['across','down']) {
    for (const {num} of PUZZLE.clues[dir]) {
      const info = numbers[num];
      if (!info) continue;
      const wc = getWordCells(info.r, info.c, dir);
      const empty = wc.find(({r,c}) => !cells[r][c].userLetter);
      if (empty) {
        gs.dir = dir;
        gs.ar = empty.r; gs.ac = empty.c;
        gs.wordCells = getWordCells(empty.r, empty.c, dir);
        highlight();
        return;
      }
    }
  }
}

// =====================================================
// PROGRESS
// =====================================================
function updateProgress() {
  let total = 0, correct = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!cells[r][c].black) {
        total++;
        if (cells[r][c].userLetter === cells[r][c].letter) correct++;
      }

  const pct = Math.round(correct/total*100);
  document.getElementById('pct-text').textContent = pct + '%';
  document.getElementById('pct-fill').style.width = pct + '%';

  if (correct === total && !gs.done) {
    gs.done = true;
    saveCurrent();
    recordStats();
    setTimeout(showModal, 500);
  }
}

function recordStats() {
  const st = getStats();
  st.p++;
  st.w++;
  st.s = (st.ld === DAY_INDEX - 1) ? st.s + 1 : 1;
  st.ld = DAY_INDEX;
  saveStats(st);
}

// =====================================================
// KEYBOARD
// =====================================================
function buildKeyboard() {
  const ROWS_KB = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L','Ñ'],
    ['↵','Z','X','C','V','B','N','M','⌫']
  ];
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  ROWS_KB.forEach(row => {
    const r = document.createElement('div');
    r.className = 'kb-row';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k==='↵'||k==='⌫'?' wide':'');
      btn.textContent = k;
      btn.addEventListener('click', () => {
        if (k==='⌫') inputBackspace();
        else if (k==='↵') flipDir();
        else inputLetter(k);
      });
      r.appendChild(btn);
    });
    kb.appendChild(r);
  });
}

document.addEventListener('keydown', e => {
  if (e.key==='Backspace') { e.preventDefault(); inputBackspace(); }
  else if (e.key==='Enter') flipDir();
  else if (e.key==='ArrowRight') moveCursor(0,1,'across');
  else if (e.key==='ArrowLeft')  moveCursor(0,-1,'across');
  else if (e.key==='ArrowDown')  moveCursor(1,0,'down');
  else if (e.key==='ArrowUp')    moveCursor(-1,0,'down');
  else if (/^[a-zA-ZñÑ]$/.test(e.key)) inputLetter(e.key.toUpperCase());
});

function moveCursor(dr, dc, preferDir) {
  const nr = gs.ar + dr, nc = gs.ac + dc;
  if (nr<0||nr>=ROWS||nc<0||nc>=COLS||cells[nr][nc].black) return;
  gs.ar = nr; gs.ac = nc;
  gs.dir = preferDir;
  if (!canDir(nr, nc, gs.dir)) gs.dir = gs.dir==='across'?'down':'across';
  gs.wordCells = getWordCells(nr, nc, gs.dir);
  highlight();
}

// =====================================================
// MODAL
// =====================================================
function showModal() {
  const st = getStats();
  document.getElementById('modal-sub').textContent = `PUZZLE #${DAY_INDEX+1} · COMPLETADO`;
  document.getElementById('st-played').textContent = st.p;
  document.getElementById('st-wins').textContent   = st.w;
  document.getElementById('st-streak').textContent = st.s;
  document.getElementById('modal').classList.add('show');
  updateCountdown();
  setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  const now = new Date();
  const tmr = new Date(now); tmr.setDate(tmr.getDate()+1); tmr.setHours(0,0,0,0);
  const d = tmr - now;
  const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000), s = Math.floor((d%60000)/1000);
  document.getElementById('modal-cd').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// =====================================================
// HEADER
// =====================================================
function setupHeader() {
  const now = new Date();
  const days   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  document.getElementById('date-str').textContent =
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('puzzle-num').textContent = `PUZZLE #${DAY_INDEX+1}`;
}

// =====================================================
// INIT
// =====================================================
function init() {
  setupHeader();
  renderGrid();
  renderClues();
  buildKeyboard();

  // Restore display
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!cells[r][c].black && cells[r][c].userLetter) {
        updateCell(r,c);
        refreshWordSolved(r,c);
      }

  updateProgress();

  if (gs.done) {
    showModal();
  } else {
    // Start at first cell
    const first = Object.values(numbers)[0];
    if (first) {
      gs.ar = first.r; gs.ac = first.c; gs.dir = 'across';
      gs.wordCells = getWordCells(first.r, first.c, 'across');
      highlight();
    }
  }
}

init();
</script>
